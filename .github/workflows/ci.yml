name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django Tests
      run: |
        python manage.py test

    - name: Build Docker Image
      run: |
        docker build -t library_project:test .

  deploy-to-ec2:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only deploy when code is pushed/merged to the main or master branch
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Deploy to Amazon EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Navigate to the project directory on EC2
          # (Assumes you have cloned the repo into a folder named library_project in your home directory)
          cd /home/${{ secrets.EC2_USERNAME }}/library_project
          
          # 2. Pull the latest code
          git pull origin main
          
          # 3. Build the Docker image directly on the EC2 server
          docker build -t library_project:latest .
          
          # 4. Stop and remove the currently running container (if any)
          docker stop library_app || true
          docker rm library_app || true
          
          # 5. Run the new Docker container (mapping port 80 on EC2 to port 8000 in the container)
          docker run -d --name library_app -p 80:8000 library_project:latest
